<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALTHORS · Inversor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E10;--s1:#161618;--s2:#1E1E21;--s3:#26262A;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#E8E6E0;--sub:#9A9890;--dim:#5A5856;
  --cl:#6B8FBF;--cl-bg:rgba(107,143,191,0.09);--cl-bd:rgba(107,143,191,0.22);
  --ag:#B8934A;--ag-bg:rgba(184,147,74,0.09);--ag-bd:rgba(184,147,74,0.22);
  --inv:#5A9E7C;--inv-bg:rgba(90,158,124,0.09);--inv-bd:rgba(90,158,124,0.22);
  --red:#A85A5A;--red-bg:rgba(168,90,90,0.09);--red-bd:rgba(168,90,90,0.22);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
nav{height:54px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,16,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:300}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.logo-word{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:var(--text)}
.nav-tabs{display:flex;gap:2px}
.ntab{padding:6px 13px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.ntab:hover{color:var(--text)}
.ntab.active{background:var(--s2);color:var(--text);border:1px solid var(--border2)}
.nav-right{display:flex;align-items:center;gap:10px}
.badge-inv{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--inv-bg);color:var(--inv);border:1px solid var(--inv-bd)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--inv-bg);border:1px solid var(--inv-bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--inv);cursor:pointer}
.btn-inv{padding:7px 16px;background:var(--inv);color:#0e0e10;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:filter .18s}
.btn-inv:hover{filter:brightness(1.08)}
.btn-ghost{padding:6px 13px;background:transparent;color:var(--sub);border:1px solid var(--border2);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.btn-ghost:hover{color:var(--text)}
.screen{display:none;position:fixed;top:54px;left:0;right:0;bottom:0;overflow:hidden}
.screen.active{display:block}
</style>
</head>
<body>
<p style="color:white;padding:20px">PARTE 1 OK</p>
</body>
</html>
